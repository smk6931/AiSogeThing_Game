<!DOCTYPE html>
<html>
<head>
    <title>3D Test</title>
    <style>
        body { margin: 0; font-family: Arial; }
        canvas { display: block; }
        .info { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.7); 
            color: white; 
            padding: 10px; 
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="info">
        <h3>🎮 3D 테스트</h3>
        <p>마우스로 회전/확대 가능</p>
        <button onclick="loadModel()">모델 로드</button>
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.module.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 조명
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 지면
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.MeshLambertMaterial({ color: 0x3a5f3a })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        camera.position.set(3, 3, 3);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.loadModel = function() {
            const loader = new GLTFLoader();
            loader.load('/models/glb_format/tree.glb', (gltf) => {
                const model = gltf.scene;
                model.scale.setScalar(0.5);
                model.position.set(0, 0, 0);
                scene.add(model);
                console.log('✅ 나무 모델 로드 완료');
                
                // 성공 메시지 표시
                const info = document.querySelector('.info');
                info.innerHTML += '<p style="color: green;">✅ 나무 모델 로드 성공!</p>';
            }, (progress) => {
                console.log('로딩 진행:', (progress.loaded / progress.total * 100) + '%');
            }, (error) => {
                console.error('❌ 모델 로드 실패:', error);
                
                // 에러 메시지 표시
                const info = document.querySelector('.info');
                info.innerHTML += '<p style="color: red;">❌ 모델 로드 실패 - 파일 경로 확인</p>';
            });
        };

        animate();
    </script>
</body>
</html>
