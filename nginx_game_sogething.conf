# ===================================================================
# Nginx 설정 파일 (game.sogething.com 전용)
# ===================================================================
# Front: 3100, Back: 8100
# ===================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name game.sogething.com www.game.sogething.com;

    # HTTP to HTTPS Redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name game.sogething.com www.game.sogething.com;

    # SSL Certs (game.sogething.com용)
    ssl_certificate /etc/letsencrypt/live/game.sogething.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.sogething.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Front-end (React/Vite) - Port 3100
    location / {
        root /home/ubuntu/game.sogething/front/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Back-end API (FastAPI) - Port 8100
    location /api/ {
        proxy_pass http://localhost:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger/OpenAPI Docs
    location /docs {
        proxy_pass http://localhost:8100;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://localhost:8100;
    }
}
